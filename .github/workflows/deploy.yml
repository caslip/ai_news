name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          timeout: 15m
          script: |
            set -e

            APP_DIR="$HOME/ai_news"

            # --- 1. 安装依赖 ---
            echo "[1/6] 安装系统依赖..."
            apt-get update -qq
            apt-get install -y -qq python3 python3-pip python3-venv curl > /dev/null 2>&1

            # --- 2. 创建目录并拉取代码（clone 走服务器网络，避免 runner 访问 github.com 超时）---
            echo "[2/6] 拉取最新代码..."
            echo "[DEBUG] APP_DIR=$APP_DIR"
            echo "[DEBUG] 检查 .git 目录是否存在..."
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              echo "[DEBUG] .git 存在，执行 git pull..."
              git remote set-url origin https://ghfast.top/https://github.com/caslip/ai_news.git
              git remote -v
              git reset --hard HEAD
              git clean -fd
              echo "[DEBUG] git fetch origin main..."
              git fetch origin main
              echo "[DEBUG] 当前 HEAD: $(git rev-parse HEAD)"
              echo "[DEBUG] 远程 main: $(git rev-parse origin/main)"
              git reset --hard origin/main
              echo "[DEBUG] 重置完毕，当前 HEAD: $(git rev-parse HEAD)"
            else
              echo "[DEBUG] .git 不存在，执行全新 clone..."
              rm -rf "$APP_DIR"
              git clone https://ghfast.top/https://github.com/caslip/ai_news.git "$APP_DIR"
              cd "$APP_DIR"
              echo "[DEBUG] clone 完毕，文件列表:"
              ls -la
            fi

            # --- 3. 配置 .env 环境变量 ---
            echo "[3/6] 配置环境变量..."
            echo "[DEBUG] 写入 .env 到 $APP_DIR/backend/.env"
            echo 'SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}' > "$APP_DIR/backend/.env"
            echo 'ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}' >> "$APP_DIR/backend/.env"
            echo "[DEBUG] .env 内容:"
            cat "$APP_DIR/backend/.env"
            echo "[DEBUG] .env 写入完毕"
            

            # --- 4. 创建虚拟环境并安装依赖 ---
            echo "[4/6] 创建虚拟环境并安装 Python 依赖..."
            cd "$APP_DIR/backend"
            echo "[DEBUG] 当前目录: $(pwd)"
            echo "[DEBUG] Python 版本: $(python3 --version)"
            echo "[DEBUG] 检查 .venv 是否存在: $([ -d .venv ] && echo '存在' || echo '不存在')"
            python3 -m venv .venv
            echo "[DEBUG] venv 创建完毕，bin 目录:"
            ls -la .venv/bin/ | head -10
            echo "[DEBUG] 激活 venv..."
            source .venv/bin/activate
            echo "[DEBUG] venv python: $(which python)"
            echo "[DEBUG] pip 版本: $(pip --version)"
            echo "[DEBUG] 开始安装 requirements.txt..."
            pip install --upgrade pip -q -i https://mirrors.aliyun.com/pypi/simple/
            pip install -r requirements.txt -q -i https://mirrors.aliyun.com/pypi/simple/
            echo "[DEBUG] 安装完成，已安装包数量: $(pip list | wc -l)"

            # --- 5. 数据库（SQLite 无需迁移，启动时自动创建表） ---
            echo "[5/6] 数据库就绪 (SQLite)..."

            # --- 6. 启动后端服务 ---
            echo "[6/6] 启动后端服务..."
            echo "[DEBUG] 当前目录: $(pwd)"
            echo "[DEBUG] 检查 backend 目录是否存在: $([ -d app ] && echo '存在' || echo '不存在')"
            if [ ! -d "app" ]; then
              echo "[ERROR] backend/app 目录不存在!"
              ls -la
              exit 1
            fi
            echo "[DEBUG] app 目录内容:"
            ls -la app/
            # --- 启动时写入 pidfile ---
            PIDFILE="$APP_DIR/backend/uvicorn.pid"

            # 停止旧进程
            if [ -f "$PIDFILE" ]; then
              OLD_PID=$(cat "$PIDFILE")
              if kill -0 "$OLD_PID" 2>/dev/null; then
                echo "[DEBUG] 停止旧进程 PID: $OLD_PID"
                kill -TERM "$OLD_PID" 2>/dev/null || true
                sleep 2
                kill -0 "$OLD_PID" 2>/dev/null && kill -9 "$OLD_PID" 2>/dev/null || true
              fi
              rm -f "$PIDFILE"
            fi

            # 启动新进程并记录 PID
            echo "[DEBUG] 启动 uvicorn..."
            nohup .venv/bin/python -m uvicorn app.main:app \
              --host 0.0.0.0 --port 8000 >> uvicorn.log 2>&1 &
            echo $! > "$PIDFILE"
            echo "[DEBUG] 新进程 PID: $(cat $PIDFILE)"
            sleep 3
            echo "[DEBUG] uvicorn 启动后，检查进程:"
            ps aux | grep uvicorn | grep -v grep || echo "[DEBUG] 未发现 uvicorn 进程!"
            echo "[DEBUG] uvicorn.log 初始内容:"
            cat uvicorn.log 2>/dev/null || echo "[DEBUG] 日志文件为空或不存在"

            # 等待服务启动
            for i in $(seq 1 20); do
              echo "[DEBUG] 健康检查尝试 #$i..."
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/health 2>&1 || echo "000")
              echo "[DEBUG] HTTP 状态码: $HTTP_CODE"
              if [ "$HTTP_CODE" = "200" ]; then
                echo ""
                echo "============================================"
                echo "  部署成功！"
                echo "  后端: http://${{ secrets.SERVER_HOST }}:8000"
                echo "  API:  http://${{ secrets.SERVER_HOST }}:8000/docs"
                echo "  前端: https://your-frontend.vercel.app (Vercel)"
                echo "============================================"
                exit 0
              fi
              printf "."
              sleep 3
            done

            echo ""
            echo "[WARN] 健康检查超时，查看最近日志:"
            tail -30 uvicorn.log 2>/dev/null || echo "无日志文件"
            echo "[DEBUG] 超时时刻的进程状态:"
            ps aux | grep uvicorn | grep -v grep || echo "[DEBUG] 无 uvicorn 进程"
            exit 1
