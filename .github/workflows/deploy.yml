name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            APP_DIR="$HOME/ai_news"

            # --- 1. 安装依赖 ---
            echo "[1/6] 安装系统依赖..."
            apt-get update -qq
            apt-get install -y -qq python3 python3-pip python3-venv curl > /dev/null 2>&1

            # --- 2. 创建目录并拉取代码（clone 走服务器网络，避免 runner 访问 github.com 超时）---
            echo "[2/6] 拉取最新代码..."
            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git reset --hard HEAD
              git clean -fd
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf "$APP_DIR"
              git clone https://github.com/caslip/ai_news.git "$APP_DIR"
              cd "$APP_DIR"
            fi

            # --- 3. 配置 .env 环境变量 ---
            echo "[3/6] 配置环境变量..."
            echo 'SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}' > "$APP_DIR/backend/.env"
            echo 'ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}' >> "$APP_DIR/backend/.env"
            echo 'OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}' >> "$APP_DIR/backend/.env"

            # --- 4. 创建虚拟环境并安装依赖 ---
            echo "[4/6] 创建虚拟环境并安装 Python 依赖..."
            cd "$APP_DIR/backend"
            python3 -m venv .venv
            source .venv/bin/activate
            pip install --upgrade pip -q -i https://mirrors.aliyun.com/pypi/simple/
            pip install -r requirements.txt -q -i https://mirrors.aliyun.com/pypi/simple/

            # --- 5. 数据库迁移 ---
            echo "[5/6] 执行数据库迁移..."
            source .venv/bin/activate
            python -m alembic upgrade head || true

            # --- 6. 启动后端服务 ---
            echo "[6/6] 启动后端服务..."
            # 先杀掉旧进程
            pkill -f "uvicorn app.main:app" 2>/dev/null || true
            sleep 2

            # 以后台 nohup 方式启动
            cd "$APP_DIR/backend"
            source .venv/bin/activate
            nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 >> "$APP_DIR/backend/uvicorn.log" 2>&1 &

            # 等待服务启动
            for i in $(seq 1 20); do
              if curl -sf http://localhost:8000/api/health > /dev/null 2>&1; then
                echo ""
                echo "============================================"
                echo "  部署成功！"
                echo "  后端: http://${{ secrets.SERVER_HOST }}:8000"
                echo "  API:  http://${{ secrets.SERVER_HOST }}:8000/docs"
                echo "  前端: https://your-frontend.vercel.app (Vercel)"
                echo "============================================"
                exit 0
              fi
              printf "."
              sleep 3
            done

            echo ""
            echo "[WARN] 健康检查超时，查看最近日志:"
            tail -20 "$APP_DIR/backend/uvicorn.log" 2>/dev/null || echo "无日志文件"
