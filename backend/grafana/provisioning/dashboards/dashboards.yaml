# Grafana Dashboard Provisioning Configuration

apiVersion: 1

providers:
  - name: 'AI News Logs'
    orgId: 1
    folder: 'AI News'
    folderUid: 'ai-news'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
