# Grafana Loki Datasource Configuration
# This file is automatically provisioned when Grafana starts

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      httpMethod: GET
      timeout: 60
    version: 1
