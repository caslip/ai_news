# AI News Aggregator - Docker Compose Configuration with Observability Stack
# Usage: docker-compose up -d

services:
  # Frontend (Main)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-news-frontend
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-news-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./frontend/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  # Frontend Writer (Next.js)
  frontend-writer:
    build:
      context: ./frontend_writer
      dockerfile: Dockerfile
    container_name: ai-news-frontend-writer
    ports:
      - "${FRONTEND_WRITER_PORT:-3002}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-news-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - ./frontend_writer/entrypoint.sh:/entrypoint.sh
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  # Backend (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-news-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-ai_news}:${POSTGRES_PASSWORD:-ai_news_password}@db:5432/${POSTGRES_DB:-ai_news}
      - DATABASE_URL_ASYNC=postgresql+asyncpg://${POSTGRES_USER:-ai_news}:${POSTGRES_PASSWORD:-ai_news_password}@db:5432/${POSTGRES_DB:-ai_news}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production-use-strong-random-key}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3001,http://frontend:3001,http://localhost:3002,http://frontend-writer:3001}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
    depends_on: []
    restart: unless-stopped
    networks:
      - ai-news-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || wget -qO- http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # Observability Stack
  # ============================================================

  # Loki - Log aggregation system
  loki:
    image: grafana/loki:2.9.4
    container_name: ai-news-loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./backend/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - ai-news-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Promtail - Log collector
  promtail:
    image: grafana/promtail:2.9.4
    container_name: ai-news-promtail
    volumes:
      - ./backend/promtail-config.yml:/etc/promtail/local-config.yaml:ro
      - ./logs:/app/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/local-config.yaml
    restart: unless-stopped
    networks:
      - ai-news-network
    depends_on:
      - loki

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: ai-news-grafana
    ports:
      - "${GRAFANA_PORT:-3200}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
    volumes:
      - ./backend/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - ai-news-network
    depends_on:
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  ai-news-network:
    driver: bridge

volumes:
  loki-data:
  grafana-data:
